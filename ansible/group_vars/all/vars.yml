---
# Non-secret variables for all hosts.
# Secrets live in vault.yml (ansible-vault encrypted).
# Sensitive values here only reference {{ vault_* }} vars defined there.

mnr_race_winrm_user: "{{ vault_mnr_race_winrm_user }}"
mnr_race_winrm_password: "{{ vault_mnr_race_winrm_password }}"

# JH1 OpenVPN used to reach the 10.104.0.0/16 network.
# ovpn_config path is relative to the repo root.
vpn:
  ovpn_config: vpn/mnr-jh1.ovpn
  server: 41.76.226.14
  port: 1194
  proto: tcp4
  username: "{{ vault_vpn_username }}"
  password: "{{ vault_vpn_password }}"

# Let's Encrypt / ACME
acme:
  account_email: dihank777@gmail.com
  client: acme.sh
  client_home: "{{ ansible_env.HOME | default('/home/dihan') }}/.acme.sh"

# Cloudflare (DNS host for mondaynightracing.co.za)
cloudflare:
  account_id: 8daa5d05c975df852dc7cb6ed15076ad
  api_token: "{{ vault_cloudflare_api_token }}"
  zones:
    mondaynightracing.co.za:
      id: 4ee0f0f1834407a3c90ac3f8de9b7e36

# Apache on mnr-race
apache:
  service_name: Apache2.4
  conf_root: 'C:\Apache24\conf'
  vhosts_conf: 'C:\Apache24\conf\extra\httpd-vhosts.conf'
  bin: 'C:\Apache24\bin\httpd.exe'
  openssl: 'C:\Apache24\bin\openssl.exe'

# Sites served and the cert files they reference
sites:
  - name: dev.rablab.co.za
    sans: [dev.rablab.co.za, www.dev.rablab.co.za]
    cert: 'C:\Certbot\live\dev.rablab.co.za\dev_rablab_co_za.crt'
    key: 'C:\Certbot\live\dev.rablab.co.za\dev.rablab.co.za_key.txt'
    chain: 'C:\Certbot\live\dev.rablab.co.za\dev_rablab_co_za.ca-bundle'
  - name: timing.mondaynightracing.co.za
    sans: [timing.mondaynightracing.co.za]
    cert: 'C:\certs\timing.mondaynightracing.co.za\certificate.cer'
    key: 'C:\certs\timing.mondaynightracing.co.za\private.key'
  - name: mondaynightracing.co.za
    sans: [mondaynightracing.co.za, '*.mondaynightracing.co.za']
    cert: 'C:\certs\mondaynightracing.co.za\fullchain.pem'
    key: 'C:\certs\mondaynightracing.co.za\privkey.pem'
    shared_with: [acc.mondaynightracing.co.za, ams2.mondaynightracing.co.za]
